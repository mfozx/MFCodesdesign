# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: mfozx/MFCodesdesign
  branch: master
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/4427645c-2a34-41c1-a541-a2920b0c783d/pkce
  auth_token_endpoint: /sites/4427645c-2a34-41c1-a541-a2920b0c783d/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://mfcodes.org

media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

collections:
  - name: "posts"
    label: "Blog Yazilari"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "post"}
      - {label: "Baslik", name: "title", widget: "string"}
      - {label: "Yazar", name: "author", widget: "string", default: "Furkan"}
      - {label: "Tarih", name: "date", widget: "datetime"}
      - {label: "Kategoriler", name: "categories", widget: "list", default: ["Genel"]}
      - {label: "Gorsel", name: "image", widget: "image", required: false}
      - {label: "Icerik", name: "body", widget: "markdown"}

  - name: "pages"
    label: "Sayfalar"
    folder: "_pages"
    create: false
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "page"}
      - {label: "Baslik", name: "title", widget: "string", required: false}
      - {label: "Icerik", name: "body", widget: "markdown"}
